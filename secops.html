<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecOps · sandeval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee; --border: #d8d2c8; --text: #1a1814;
      --text2: #6b6558; --text3: #a09880; --accent: #c96442;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(rgba(26,24,20,0.14) 1.4px, transparent 1.4px);
      background-size: 24px 24px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .slug {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -1px;
      color: var(--text);
    }
    p {
      font-size: 13px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }
    a {
      font-size: 12px;
      color: var(--text2);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    a:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="slug">/secops</span>
    <h1>SecOps</h1>
    <p>coming soon — check back.</p>
    <a href="/">← back</a>
  </div>
</body>
</html>
